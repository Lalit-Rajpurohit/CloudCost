# ===========================================
# Cloud Cost Monitor - Application Properties
# ===========================================

# Application Info
spring.application.name=cloud-cost-monitor

# Server Configuration
server.port=8080

# ===========================================
# H2 Database Configuration (File Mode)
# ===========================================
spring.datasource.url=jdbc:h2:file:./data/costs;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for development/debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# AWS Configuration
# ===========================================
# Region can be overridden via AWS_REGION environment variable
aws.region=${AWS_REGION:us-east-1}

# ===========================================
# Budget Alert Configuration
# ===========================================
# Default monthly budget threshold (in USD)
alert.budget.monthly-threshold=100.00
# Email to send alerts to
alert.budget.email-recipient=${ALERT_EMAIL:admin@example.com}

# ===========================================
# Mail Configuration (for alerts)
# ===========================================
# Configure your SMTP server here
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===========================================
# Actuator Endpoints
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ===========================================
# Logging Configuration
# ===========================================
logging.level.root=INFO
logging.level.com.cloudmonitor=DEBUG
logging.level.software.amazon.awssdk=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===========================================
# Scheduler Configuration
# ===========================================
# Enable/disable the scheduled cost fetcher
scheduler.cost-fetch.enabled=true
